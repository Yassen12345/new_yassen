name: Production CI/CD - yassen_hamdy

on:
  workflow_dispatch:

concurrency:
  group: production_environment
  cancel-in-progress: true

env:
  ENVIRONMENT_NAME: yassen_hamdy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: yassen_hamdy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app-artifact
          path: target/*.jar

      - name: Print Success Summary
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **JAR Artifact** | ✅ Created & Uploaded |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Image** | ⏭️ Skipped (Local Setup) |" >> $GITHUB_STEP_SUMMARY
          echo "| **CD Repo Updated** | ⏭️ Skipped (Local Setup) |" >> $GITHUB_STEP_SUMMARY
