global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: yassen_hamdy

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/recording_rules.yml
  - /etc/prometheus/rules/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: demo1_app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - demo1-app:8090
