groups:
  - name: yassen_hamdy_alerts
    rules:
      - alert: HighCPUUsage
        expr: instance:node_cpu_usage:percent > 80
        for: 2m
        labels:
          severity: warning
          owner: yassen_hamdy
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.2f\" }}% on {{ $labels.instance }} (threshold: 80%)."

      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          owner: yassen_hamdy
        annotations:
          summary: "Target {{ $labels.job }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 3m
        labels:
          severity: warning
          owner: yassen_hamdy
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% on {{ $labels.instance }}."
