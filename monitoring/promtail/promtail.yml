server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Log Path 1: Application logs (Spring Boot demo1)
  - job_name: yassen_hamdy_app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: demo1_app
          namespace: yassen_hamdy
          log_type: application
          __path__: /var/log/yassen_hamdy/app/*.log

  # Log Path 2: System/nginx access logs
  - job_name: yassen_hamdy_access_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: access_logs
          namespace: yassen_hamdy
          log_type: access
          __path__: /var/log/yassen_hamdy/access/*.log

  # Log Path 3: Error/system logs
  - job_name: yassen_hamdy_error_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: error_logs
          namespace: yassen_hamdy
          log_type: error
          __path__: /var/log/yassen_hamdy/error/*.log
