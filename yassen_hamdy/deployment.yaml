apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo1-app
  namespace: yassen_hamdy
  labels:
    app: demo1-app
    owner: yassen_hamdy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo1-app
  template:
    metadata:
      labels:
        app: demo1-app
        owner: yassen_hamdy
    spec:
      containers:
        - name: demo1-app
          image: yassenhamdy/demo1:latest
          ports:
            - containerPort: 8090
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 5
