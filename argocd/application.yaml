apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yassen-hamdy-demo1
  namespace: argocd
  labels:
    owner: yassen_hamdy
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: yassen-hamdy-project
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/java.git
    targetRevision: master
    path: yassen_hamdy
  destination:
    server: https://kubernetes.default.svc
    namespace: yassen_hamdy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
